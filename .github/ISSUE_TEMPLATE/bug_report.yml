name: Bug report
description: Report something that isn't working in Scrub
labels: ["needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill out the sections below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Launch Scrub
        2. Start cleaning mode
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Scrub version
      description: From the release zip name or the menu-bar app.
      placeholder: v1.0.0
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "14.5 (Sonoma)"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Any relevant Console output or screenshots.
    validations:
      required: false
